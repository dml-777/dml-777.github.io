<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dona Lingga | Digital Photography</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <p class="eyebrow">DIGITAL PHOTOGRAPHY</p>
      <h1>Dona Lingga</h1>
      <p class="intro">
        A selection of digital photographs exploring color, composition,
        light, and atmosphere.
      </p>

        <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="film.html">Film</a>
        <a href="digital.html">Digital</a>
        <a href="art.html" class="active-link">Art</a>
        <a href="about.html">About Me!</a>
      </nav>
    </header>

    <div class="divider"></div>

    <main>
      <section class="gallery-section">
        <p class="section-label">DIGITAL PHOTOGRAPHY</p>
        <div class="gallery-grid" id="galleryGrid"></div>
      </section>
    </main>
  </div>

  <div class="modal" id="photoModal" aria-hidden="true">
    <div class="modal-backdrop"></div>

    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="close-button" id="closeModal" type="button" aria-label="Close photo view">&times;</button>

      <div class="modal-image-wrap">
        <img id="modalImage" src="" alt="" />
      </div>

      <div class="modal-text">
        <h2 id="modalTitle"></h2>
        <p id="modalMedium" class="modal-medium"></p>
        <p id="modalDescription" class="modal-description"></p>
      </div>
    </div>
  </div>

  <script src="digital.js"></script>
</body>
</html>
